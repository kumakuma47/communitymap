<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes"><title>社内コミュニティマップ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:12px;padding:10px;color:#111;background:#FAF6EE}
input,select{font-size:11px;padding:2px 5px;border:1px solid #ccc;border-radius:4px;outline:none;background:#fff;color:#111}
button{font-size:11px;padding:2px 7px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer}
button:hover{background:#f0f0f0}
button.info{background:#e8f0fe;color:#1a5fd4;border-color:#9db8f5}
button.danger{color:#c0392b;border-color:#e07070}
button.sm{padding:1px 4px;font-size:10px}
.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px}
h2{font-size:12px;font-weight:700;margin-bottom:8px;color:#333}
.flex{display:flex;gap:5px;align-items:center}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.map-card{border-radius:8px;padding:8px 10px;min-height:60px}
.map-card.full{grid-column:1/-1}
.card-title{font-size:12px;font-weight:700}
.name-chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;margin:1px;color:#111;font-weight:500}
.chip-sel{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;margin:2px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;color:#555}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ex-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.ex-tbl th{background:#e8ecf0;border:1px solid #bfc5cc;padding:3px 6px;font-weight:600;color:#444;text-align:left;position:sticky;top:0;z-index:1;white-space:nowrap}
.ex-tbl td{border:1px solid #d0d5da;padding:0;vertical-align:middle;height:24px}
.ex-tbl td.cell{padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-tbl tr:nth-child(even) td{background:#f7f9fb}
.ex-tbl tr:hover td{background:#eef3ff}
.row-num{background:#e8ecf0;border:1px solid #bfc5cc;color:#888;font-size:10px;text-align:center;padding:0 4px;width:28px;user-select:none}
.av{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:#e8f0fe;color:#3949ab;flex-shrink:0;vertical-align:middle}
.com-badge{display:inline-flex;align-items:center;gap:2px;padding:0px 5px;border-radius:10px;font-size:10px;margin:1px;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.grp-sel{font-size:10px;height:18px;padding:0 2px;border:1px solid #ccc;border-radius:3px;max-width:90px}
.grp-block{border-left:2px solid rgba(0,0,0,.12);padding-left:6px;margin-bottom:4px}
.roster-row.dragging{opacity:.4}
.roster-row.drag-over-top td{box-shadow:inset 0 2px 0 0 #1a5fd4}
.roster-row.drag-over-bottom td{box-shadow:inset 0 -2px 0 0 #1a5fd4}
.drag-handle:active{cursor:grabbing}
.chip-mini{display:inline-block;font-size:9px;padding:0px 5px;border-radius:8px;margin:1px;font-weight:600;border:1px solid transparent}

/* ロック画面 */
#lockScreen{position:fixed;inset:0;background:rgba(240,240,240,.97);display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:32px 40px;text-align:center;min-width:280px}
.lock-box h1{font-size:16px;font-weight:700;margin-bottom:6px;color:#222}
.lock-box p{font-size:11px;color:#888;margin-bottom:18px}
.lock-box input{width:100%;height:32px;font-size:14px;text-align:center;letter-spacing:.1em;margin-bottom:10px}
.lock-box button{width:100%;height:32px;font-size:13px}
.lock-err{color:#c0392b;font-size:11px;margin-top:6px;display:none}
#lockBtn{position:fixed;top:10px;right:12px;font-size:10px;padding:2px 8px;z-index:100}

/* ===== スマホ対応（レイアウトそのまま、画面幅に合わせて全体を縮小） ===== */
@media (max-width: 860px){
  #editBtn,#lockBtn{top:6px;right:6px;font-size:11px;padding:4px 9px}
  svg#vennSvg{max-height:none !important}
  .ex-tbl{font-size:8.5px;table-layout:fixed;min-width:310px}
  .ex-tbl th,.ex-tbl td.cell{padding:1px 2px}
  #rosterColgroup col:nth-child(1){width:58px}
  #rosterColgroup col:nth-child(2){width:36px}
  #rosterColgroup col:nth-child(3){width:32px}
  #rosterColgroup col:nth-child(4){width:auto}
  #rosterTableWrap{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y}
  .com-badge{font-size:7.5px;padding:0 3px}
  .chip-mini{font-size:7px;padding:0 2px}
  .ex-tbl th{padding:2px 4px;font-size:10px}
  .ex-tbl td.cell{padding:1px 4px;height:20px}
  .chip-mini{font-size:8px;padding:0px 4px}
  .com-badge{font-size:9px;padding:0px 4px}
  .name-chip{font-size:9px;padding:1px 5px}
}
@media (max-width: 480px){
  body{font-size:12px}
}
</style>
</head><body>

<!-- 編集パスワードモーダル -->
<div id="lockScreen" style="display:none">
  <div class="lock-box">
    <h1>🐻 編集モード</h1>
    <p>編集するにはパスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="info" onclick="checkPw()">ログイン</button>
    <div class="lock-err" id="pwErr">パスワードが違います</div>
    <div style="margin-top:12px">
      <button onclick="document.getElementById('lockScreen').style.display='none'" style="width:100%;font-size:11px;color:#888;border-color:#ddd">キャンセル</button>
    </div>
  </div>
</div>

<button id="editBtn" onclick="openEditPrompt()" style="position:fixed;top:10px;right:12px;font-size:10px;padding:2px 8px;z-index:100;background:#e8f0fe;color:#1a5fd4;border-color:#9db8f5">🔒 編集</button>
<button id="lockBtn" onclick="lockApp()" style="display:none;position:fixed;top:10px;right:12px;font-size:10px;padding:2px 8px;z-index:100">🔒 ロック</button>

<div style="display:flex;flex-direction:column;gap:10px" id="mainApp">
  <div class="main-grid" style="display:grid;grid-template-columns:480px 1fr;gap:10px;align-items:stretch">

    <!-- 左：名簿＋追加 -->
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="panel" style="display:flex;flex-direction:column;height:100%">
        <h2>📋 名簿</h2>
        <!-- 絞り込み -->
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:7px;background:#f7f5ef;border:1px solid #e5e0d3;border-radius:5px;padding:6px">
          <input id="rosterSearch" placeholder="🔍 名前で検索" oninput="renderRoster()" style="flex:1;min-width:90px;height:22px"/>
          <select id="rosterFilterDiv" onchange="renderRoster()" style="height:22px"><option value="">事業部:全て</option></select>
          <select id="rosterFilterRole" onchange="renderRoster()" style="height:22px"><option value="">役職:全て</option></select>
          <select id="rosterFilterCom" onchange="renderRoster()" style="height:22px"><option value="">コミュニティ:全て</option></select>
          <button class="sm" onclick="clearRosterFilters()" style="height:22px">クリア</button>
        </div>
        <!-- 追加フォーム -->
        <div id="addForm" style="display:grid;grid-template-columns:1fr 80px 90px 70px auto;gap:4px;margin-bottom:8px;align-items:center">
          <input id="newName" placeholder="フルネーム" style="height:24px"/>
          <select id="newDiv" style="height:24px"><option value="">事業部</option></select>
          <div style="position:relative">
            <button type="button" onclick="toggleNewRolePicker(event)" style="height:24px;width:100%;font-size:11px;text-align:left;padding-left:6px">役職 ▾</button>
            <div id="newRolePicker" style="display:none;position:absolute;top:26px;left:0;background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15);min-width:140px">
              <div id="newRoleChecks" style="display:flex;flex-direction:column;gap:2px"></div>
            </div>
          </div>
          <button class="info" onclick="addMember()" style="height:24px">＋ 追加</button>
        </div>
        <div id="rosterTableWrap" style="max-height:400px;overflow-y:auto;overflow-x:auto;border:1px solid #bfc5cc;border-radius:4px">
          <table class="ex-tbl" id="rosterTable">
            <colgroup id="rosterColgroup">
              <col style="width:90px">
              <col style="width:58px">
              <col style="width:68px">
              <col>
              <col style="width:46px">
            </colgroup>
            <thead>
              <tr>
                <th>氏名</th>
                <th>事業部</th>
                <th>役職</th>
                <th>所属コミュニティ / グループ</th>
                <th id="deleteTh"></th>
              </tr>
            </thead>
            <tbody id="rosterBody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel" id="addComPanel">
        <h2>➕ コミュニティ追加</h2>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <input id="newComName" placeholder="コミュニティ名" style="flex:1;min-width:100px;height:24px"/>
          <div class="flex">
            <label style="font-size:11px;color:#666;white-space:nowrap">色:</label>
            <input type="color" id="newComColor" value="#FF6B6B" style="width:36px;padding:1px;height:24px"/>
          </div>
          <button class="info" style="height:24px" onclick="addCommunity()">追加</button>
        </div>
      </div>

      <div class="panel" id="addDivRolePanel">
        <h2>➕ 事業部・役職を追加</h2>
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:4px">
          <input id="newDivName" placeholder="新しい事業部名" style="flex:1;height:24px"/>
          <button class="info" style="height:24px" onclick="addDivisionUI()">追加</button>
        </div>
        <div id="divListChips" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px"></div>
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:4px">
          <input id="newRoleName" placeholder="新しい役職名" style="flex:1;height:24px"/>
          <button class="info" style="height:24px" onclick="addRoleUI()">追加</button>
        </div>
        <div id="roleListChips" style="display:flex;flex-wrap:wrap;gap:3px"></div>
      </div>
    </div>

    <!-- 右：マップ -->
    <div class="panel" style="display:flex;flex-direction:column">
      <h2>コミュニティマップ</h2>
      <div style="overflow-y:auto">
        <div class="map-grid" id="mapGrid"></div>
      </div>
    </div>
  </div>

  <!-- ベン図 -->
  <div class="panel">
    <h2>ベン図</h2>
    <!-- フィルター絞り込みモード -->
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;margin-bottom:10px">
      <div style="display:flex;flex-direction:column;gap:4px">
        <span style="font-size:10px;font-weight:600;color:#555">絞り込み軸</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="vennModeRow">
          <label style="font-size:11px;cursor:pointer;padding:2px 8px;border-radius:12px;border:1px solid #ccc;background:#fff"><input type="radio" name="vennMode" value="community" style="display:none" onchange="vennMode=this.value;vennSel=[];renderVennPanel()"> <span>コミュニティ</span></label>
          <label style="font-size:11px;cursor:pointer;padding:2px 8px;border-radius:12px;border:1px solid #ccc;background:#fff"><input type="radio" name="vennMode" value="div" style="display:none" onchange="vennMode=this.value;vennSel=[];renderVennPanel()"> <span>事業部</span></label>
          <label style="font-size:11px;cursor:pointer;padding:2px 8px;border-radius:12px;border:1px solid #ccc;background:#fff"><input type="radio" name="vennMode" value="role" style="display:none" onchange="vennMode=this.value;vennSel=[];renderVennPanel()"> <span>役職</span></label>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px">
        <span style="font-size:10px;font-weight:600;color:#555">追加フィルター（絞り込み）</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center" id="filterBlocksRow">
          <div id="filterDivBlock">
            <span style="font-size:10px;color:#888">事業部:</span>
            <div style="display:inline-flex;gap:2px;flex-wrap:wrap" id="filterDivRow"></div>
          </div>
          <div id="filterRoleBlock">
            <span style="font-size:10px;color:#888">役職:</span>
            <div style="display:inline-flex;gap:2px;flex-wrap:wrap" id="filterRoleRow"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="vennSelector" style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px"></div>
    <svg id="vennSvg" viewBox="0 0 640 340" style="width:100%;max-height:420px;display:block"></svg>
  </div>
</div>

<script>
const PASSWORD = "community47";
let DIVISIONS = ["au","docomo","ws"];
let ROLES = ["PM","TR","広報","CP","PS","IN","NV","人事"];
const ROLE_COLORS = {
  "PM":    {bg:"#FEF3C7",text:"#92400E",border:"#FCD34D"},
  "TR":    {bg:"#D1FAE5",text:"#065F46",border:"#6EE7B7"},
  "広報":  {bg:"#FCE7F3",text:"#9D174D",border:"#F9A8D4"},
  "CP":{bg:"#EDE9FE",text:"#5B21B6",border:"#C4B5FD"},
  "PS":       {bg:"#FFEDD5",text:"#9A3412",border:"#FDBA74"},
  "IN":    {bg:"#DBEAFE",text:"#1E40AF",border:"#93C5FD"},
  "NV":    {bg:"#F0FDF4",text:"#14532D",border:"#86EFAC"},
};
let DIV_COLORS = {au:"#FFF3E0",docomo:"#FFEBEE",ws:"#E0F7FA"};
let DIV_TEXT   = {au:"#E65100",docomo:"#B71C1C",ws:"#006064"};
let DIV_BORDER = {au:"#FFCC80",docomo:"#EF9A9A",ws:"#80DEEA"};
const DIV_PALETTE = [
  {bg:"#F3E8FF",text:"#6B21A8",border:"#D8B4FE"},
  {bg:"#E0F2FE",text:"#075985",border:"#7DD3FC"},
  {bg:"#FCE7F3",text:"#9D174D",border:"#F9A8D4"},
  {bg:"#ECFCCB",text:"#3F6212",border:"#BEF264"},
  {bg:"#FFE4E6",text:"#9F1239",border:"#FDA4AF"},
  {bg:"#E0E7FF",text:"#3730A3",border:"#A5B4FC"},
];
const ROLE_PALETTE = [
  {bg:"#FEF3C7",text:"#92400E",border:"#FCD34D"},
  {bg:"#D1FAE5",text:"#065F46",border:"#6EE7B7"},
  {bg:"#FCE7F3",text:"#9D174D",border:"#F9A8D4"},
  {bg:"#EDE9FE",text:"#5B21B6",border:"#C4B5FD"},
  {bg:"#FFEDD5",text:"#9A3412",border:"#FDBA74"},
  {bg:"#DBEAFE",text:"#1E40AF",border:"#93C5FD"},
  {bg:"#F0FDF4",text:"#14532D",border:"#86EFAC"},
];
function addDivision(name){
  if(!name||DIVISIONS.includes(name))return;
  DIVISIONS.push(name);
  const c=DIV_PALETTE[(DIVISIONS.length-1)%DIV_PALETTE.length];
  DIV_COLORS[name]=c.bg;DIV_TEXT[name]=c.text;DIV_BORDER[name]=c.border;
}
function addRole(name){
  if(!name||ROLES.includes(name))return;
  ROLES.push(name);
  const c=ROLE_PALETTE[(ROLES.length-1)%ROLE_PALETTE.length];
  ROLE_COLORS[name]=c;
}
function removeDivision(name){
  if(isViewOnly)return;
  if(!confirm(`「${name}」を削除しますか？所属しているメンバーの事業部欄は空になります。`))return;
  DIVISIONS=DIVISIONS.filter(d=>d!==name);
  delete DIV_COLORS[name];delete DIV_TEXT[name];delete DIV_BORDER[name];
  members.forEach(m=>{if(m.div===name)m.div="";});
  render();
}
function removeRole(name){
  if(isViewOnly)return;
  if(!confirm(`「${name}」を削除しますか？所属しているメンバーの役職から外れます。`))return;
  ROLES=ROLES.filter(r=>r!==name);
  delete ROLE_COLORS[name];
  members.forEach(m=>{
    if(Array.isArray(m.role))m.role=m.role.filter(r=>r!==name);
    else if(m.role===name)m.role=[];
  });
  render();
}
function renderDivRoleLists(){
  const divEl=document.getElementById("divListChips");
  if(divEl){
    divEl.innerHTML=DIVISIONS.map(d=>{
      const c={bg:DIV_COLORS[d]||"#eee",text:DIV_TEXT[d]||"#333",border:DIV_BORDER[d]||"#ccc"};
      return`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 6px;border-radius:10px;font-size:10px;border:1px solid ${c.border};background:${c.bg};color:${c.text}">
        <span onclick="toggleDivSwatchPicker('${d}',event)" title="色を変更" style="width:10px;height:10px;border-radius:50%;background:${c.border};border:1px solid rgba(0,0,0,.2);cursor:pointer;flex-shrink:0"></span>
        ${d}
        <span onclick="removeDivision('${d}')" style="cursor:pointer;font-weight:700;padding:0 2px" title="削除">✕</span>
        <span id="divSwatch-${encodeURIComponent(d)}" style="display:none;position:absolute;background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15);margin-top:20px">
          <div style="display:grid;grid-template-columns:repeat(5,16px);gap:4px">
            ${SWATCHES.map(s=>`<div onclick="changeDivColor('${d}','${s}');closeDivSwatch('${d}')" title="${s}" style="width:16px;height:16px;border-radius:50%;background:${s};border:1.5px solid rgba(0,0,0,.15);cursor:pointer${c.border===s?';outline:2px solid #333;outline-offset:1px':''}"></div>`).join("")}
          </div>
        </span>
      </span>`;
    }).join("");
  }
  const roleEl=document.getElementById("roleListChips");
  if(roleEl){
    roleEl.innerHTML=ROLES.map(r=>{
      const c=ROLE_COLORS[r]||{bg:"#F3E8FF",text:"#6B21A8",border:"#D8B4FE"};
      return`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 6px;border-radius:10px;font-size:10px;border:1px solid ${c.border};background:${c.bg};color:${c.text}">
        <span onclick="toggleRoleSwatchPicker('${r}',event)" title="色を変更" style="width:10px;height:10px;border-radius:50%;background:${c.border};border:1px solid rgba(0,0,0,.2);cursor:pointer;flex-shrink:0"></span>
        ${r}
        <span onclick="removeRole('${r}')" style="cursor:pointer;font-weight:700;padding:0 2px" title="削除">✕</span>
        <span id="roleSwatch-${encodeURIComponent(r)}" style="display:none;position:absolute;background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15);margin-top:20px">
          <div style="display:grid;grid-template-columns:repeat(5,16px);gap:4px">
            ${SWATCHES.map(s=>`<div onclick="changeRoleColor('${r}','${s}');closeRoleSwatch('${r}')" title="${s}" style="width:16px;height:16px;border-radius:50%;background:${s};border:1.5px solid rgba(0,0,0,.15);cursor:pointer${c.border===s?';outline:2px solid #333;outline-offset:1px':''}"></div>`).join("")}
          </div>
        </span>
      </span>`;
    }).join("");
  }
}

const SWATCHES = [
  "#FF6B6B","#FF9F43","#F7C948","#A8E063","#26de81",
  "#00B894","#1DD1A1","#54A0FF","#5B5FEF","#8B5CF6",
  "#EC407A","#F06292","#06B6D4","#0097A7","#FF7675",
  "#6C5CE7","#00CEC9","#FDCB6E","#E17055","#74B9FF",
];
let openSwatchId=null;
function toggleSwatchPicker(cid,e){
  e.stopPropagation();
  const el=document.getElementById("swatch-"+cid);
  if(!el)return;
  const wasHidden=el.style.display==="none"||el.style.display==="";
  if(openSwatchId&&openSwatchId!==cid)closeSwatch(openSwatchId);
  el.style.display=wasHidden?"block":"none";
  openSwatchId=wasHidden?cid:null;
}
function closeSwatch(cid){
  const el=document.getElementById("swatch-"+cid);
  if(el)el.style.display="none";
  if(openSwatchId===cid)openSwatchId=null;
}
document.addEventListener("click",()=>{if(openSwatchId)closeSwatch(openSwatchId);});

let openRoleSwatch=null;
function toggleRoleSwatchPicker(role,e){
  e.stopPropagation();
  const id="roleSwatch-"+encodeURIComponent(role);
  const el=document.getElementById(id);
  if(!el)return;
  const wasHidden=el.style.display==="none"||el.style.display==="";
  if(openRoleSwatch&&openRoleSwatch!==role)closeRoleSwatch(openRoleSwatch);
  el.style.display=wasHidden?"block":"none";
  openRoleSwatch=wasHidden?role:null;
}
function closeRoleSwatch(role){
  const el=document.getElementById("roleSwatch-"+encodeURIComponent(role));
  if(el)el.style.display="none";
  if(openRoleSwatch===role)openRoleSwatch=null;
}
document.addEventListener("click",()=>{if(openRoleSwatch)closeRoleSwatch(openRoleSwatch);});
function changeRoleColor(role,hex){
  ROLE_COLORS[role]={bg:hl(hex,.18),text:"#111",border:hex};
  render();
}

let openDivSwatch=null;

function hl(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function ini(n){return n.split(/\s+/).map(p=>p[0]).join("").slice(0,2)}
function mn(id){return members.find(m=>m.id===id)?.name||""}
function cob(id){return communities.find(c=>c.id===id)}
function unso(){return communities.find(c=>c.name==="無所属")}
function sortedCommunities(){
  const u=communities.filter(c=>c.name==="無所属");
  return [...communities.filter(c=>c.name!=="無所属"),...u];
}
function memberInCom(mid,cid){return members.find(m=>m.id===mid)?.coms.some(e=>e.cid===cid)||false}
function comMemberIds(cid){return members.filter(m=>m.coms.some(e=>e.cid===cid)).map(m=>m.id)}
function grpMemberIds(cid,gid){return members.filter(m=>m.coms.some(e=>e.cid===cid&&e.gid===gid)).map(m=>m.id)}

function syncUnso(m){
  const u=unso();if(!u)return;
  const hasOther=m.coms.some(e=>e.cid!==u.id);
  const inUnso=m.coms.some(e=>e.cid===u.id);
  if(hasOther&&inUnso) m.coms=m.coms.filter(e=>e.cid!==u.id);
  else if(!hasOther&&!inUnso) m.coms.push({cid:u.id,gid:u.groups[0].id});
}

let dragSrcId=null;
function initRosterDragDrop(){
  if(isViewOnly)return;
  const rows=document.querySelectorAll(".roster-row");
  rows.forEach(row=>{
    const id=parseInt(row.dataset.id);
    row.addEventListener("dragstart",e=>{
      dragSrcId=id;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
    });
    row.addEventListener("dragend",()=>{
      row.classList.remove("dragging");
      document.querySelectorAll(".roster-row").forEach(r=>{r.classList.remove("drag-over-top");r.classList.remove("drag-over-bottom");});
    });
    row.addEventListener("dragover",e=>{
      e.preventDefault();
      if(dragSrcId===id)return;
      const rect=row.getBoundingClientRect();
      const isTopHalf=(e.clientY-rect.top)<rect.height/2;
      document.querySelectorAll(".roster-row").forEach(r=>{r.classList.remove("drag-over-top");r.classList.remove("drag-over-bottom");});
      row.classList.add(isTopHalf?"drag-over-top":"drag-over-bottom");
    });
    row.addEventListener("drop",e=>{
      e.preventDefault();
      document.querySelectorAll(".roster-row").forEach(r=>{r.classList.remove("drag-over-top");r.classList.remove("drag-over-bottom");});
      if(dragSrcId===null||dragSrcId===id)return;
      const fromIdx=members.findIndex(m=>m.id===dragSrcId);
      let toIdx=members.findIndex(m=>m.id===id);
      if(fromIdx<0||toIdx<0)return;
      const rect=row.getBoundingClientRect();
      const isTopHalf=(e.clientY-rect.top)<rect.height/2;
      const [moved]=members.splice(fromIdx,1);
      toIdx=members.findIndex(m=>m.id===id);
      const insertAt=isTopHalf?toIdx:toIdx+1;
      members.splice(insertAt,0,moved);
      dragSrcId=null;
      render();
    });
  });
}

function renderRoster(){
  populateRosterFilterSelects();
  populateNewMemberForm();
  const cg=document.getElementById("rosterColgroup");
  if(cg){
    cg.innerHTML=isViewOnly
      ? '<col style="width:90px"><col style="width:58px"><col style="width:68px"><col>'
      : '<col style="width:90px"><col style="width:58px"><col style="width:68px"><col><col style="width:46px">';
  }
  const body=document.getElementById("rosterBody");
  const sorted=sortedCommunities();
  const searchVal=(document.getElementById("rosterSearch")?.value||"").trim().toLowerCase();
  const filDiv=document.getElementById("rosterFilterDiv")?.value||"";
  const filRole=document.getElementById("rosterFilterRole")?.value||"";
  const filCom=document.getElementById("rosterFilterCom")?.value||"";
  let filteredMembers=members.filter(m=>{
    if(searchVal&&!m.name.toLowerCase().includes(searchVal))return false;
    if(filDiv&&m.div!==filDiv)return false;
    if(filRole){const mrl=Array.isArray(m.role)?m.role:(m.role?[m.role]:[]);if(!mrl.includes(filRole))return false;}
    if(filCom&&!memberInCom(m.id,parseInt(filCom)))return false;
    return true;
  });
  if(!members.length){body.innerHTML=`<tr><td colspan="${isViewOnly?4:5}" style="text-align:center;color:#999;padding:8px;border:1px solid #d0d5da">名簿が空です</td></tr>`;return;}
  if(!filteredMembers.length){body.innerHTML=`<tr><td colspan="${isViewOnly?4:5}" style="text-align:center;color:#999;padding:8px;border:1px solid #d0d5da">条件に一致するメンバーがいません</td></tr>`;return;}
  body.innerHTML=filteredMembers.map((m,idx)=>{
    const divBadge=m.div?`<span class="chip-mini" style="background:${DIV_COLORS[m.div]||"#eee"};color:${DIV_TEXT[m.div]||"#333"};border-color:${DIV_BORDER[m.div]||"#ccc"}">${m.div}</span>`:"—";
    const memberRoles=Array.isArray(m.role)?m.role:(m.role?[m.role]:[]);
    const roleBadge=memberRoles.length?memberRoles.map(r=>{const rc=ROLE_COLORS[r]||{bg:"#F3E8FF",text:"#6B21A8",border:"#D8B4FE"};return`<span class="chip-mini" style="background:${rc.bg};color:${rc.text};border-color:${rc.border}">${r}</span>`;}).join(""):"—";
    const u=unso();
    const badges=sorted.map(c=>{
      const on=memberInCom(m.id,c.id);
      const isU=u&&c.id===u.id;
      if(isU) return on?`<span class="com-badge" style="border-color:#aaa;background:#f0f0f0;color:#888;cursor:default">無所属</span>`:"";
      // グループ名をバッジの横に付ける
      const entry=m.coms.find(e=>e.cid===c.id);
      const grpLabel=(()=>{
        if(!entry||!on)return"";
        const g=c.groups.find(g=>g.id===entry.gid);
        if(!g||c.groups.length<=1)return"";
        return g.name||"G"+(c.groups.indexOf(g)+1);
      })();
      if(isViewOnly){
        return on?`<span style="display:inline-flex;align-items:center;gap:0;margin:1px">
          <span class="com-badge" style="border-color:${c.hex};background:${hl(c.hex,.15)};color:${c.hex};cursor:default">✓ ${c.name}</span>${grpLabel?`<span style="font-size:10px;color:${c.hex};padding:0 4px;white-space:nowrap">›${grpLabel}</span>`:""}
        </span>`:"";
      }
      return`<span style="display:inline-flex;align-items:center;gap:0;margin:1px">
        <span class="com-badge" onclick="toggleMemberCom(${m.id},${c.id})" style="border-color:${on?c.hex:"#e0e0e0"};background:${on?hl(c.hex,.15):"transparent"};color:${on?c.hex:"#bbb"}">${on?"✓ ":""}${c.name}</span>

      : `<td class="cell" style="white-space:normal"><div style="display:flex;flex-wrap:wrap;gap:2px">${ROLES.map(r=>{const rc=ROLE_COLORS[r]||{bg:"#F3E8FF",text:"#6B21A8",border:"#D8B4FE"};const on=memberRoles.includes(r);return`<span onclick="toggleMemberRole(${m.id},'${r}')" style="display:inline-block;padding:0px 5px;border-radius:8px;font-size:9px;cursor:pointer;border:1px solid ${on?rc.border:"#ddd"};background:${on?rc.bg:"transparent"};color:${on?rc.text:"#bbb"}">${r}</span>`;}).join("")}</div></td>`;

    return`<tr draggable="${isViewOnly?"false":"true"}" data-id="${m.id}" class="roster-row">
      ${isViewOnly
        ? `<td class="cell" style="font-weight:500;font-size:11px">${m.name}</td>`

        <span class="drag-handle" title="ドラッグして移動" style="cursor:grab;font-size:14px;color:#999;line-height:1;user-select:none;padding:2px 1px">⠿</span>

  }).join("");
}

    const full=isOdd&&idx===sorted.length-1;
    const hasG=c.groups.length>1;
    const isU=c.name==="無所属";
    const gHtml=c.groups.map(g=>{
      const mids=grpMemberIds(c.id,g.id);
      const chips=mids.map(id=>{
        const m=members.find(x=>x.id===id);if(!m)return"";
        const divB=m.div?`<span class="chip-mini" style="background:${DIV_COLORS[m.div]||"#eee"};color:${DIV_TEXT[m.div]||"#555"};border-color:${DIV_BORDER[m.div]||"#ccc"}">${m.div}</span>`:"";

        return`<span class="name-chip" style="background:${hl(c.hex,.25)};border:1px solid ${hl(c.hex,.5)};color:#111">${m.name}${divB}${roleB}</span>`;
      }).join("");
      return`<div class="${hasG?"grp-block":""}">
        ${hasG?`<div class="flex" style="margin-bottom:2px;gap:3px">
          <input value="${g.name}" placeholder="グループ名" oninput="renameGroup(${c.id},${g.id},this.value)" style="height:18px;font-size:10px;flex:1;background:${hl(c.hex,.07)}" ${isViewOnly?"readonly":""} />
          ${isViewOnly?"":"<button class=\"danger sm\" onclick=\"removeGroup("+c.id+","+g.id+")\">✕</button>"}
        </div>`:""}
        <div style="display:flex;flex-wrap:wrap;gap:2px">${chips||`<span style="font-size:10px;color:#aaa">なし</span>`}</div>
      </div>`;
    }).join("");
    return`<div class="map-card${full?" full":""}" style="background:#fff;border:2px solid ${hl(c.hex,.5)}">
      <div class="flex" style="justify-content:space-between;margin-bottom:6px">

            <div onclick="toggleSwatchPicker(${c.id},event)" style="width:14px;height:14px;border-radius:50%;background:${c.hex};border:1.5px solid rgba(0,0,0,.2);cursor:pointer"></div>
            <div id="swatch-${c.id}" style="display:none;position:absolute;top:18px;left:0;background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15);display:none">
              <div style="display:grid;grid-template-columns:repeat(5,16px);gap:4px">
                ${SWATCHES.map(s=>`<div onclick="changeCommunityColor(${c.id},'${s}');closeSwatch(${c.id})" title="${s}" style="width:16px;height:16px;border-radius:50%;background:${s};border:1.5px solid rgba(0,0,0,.15);cursor:pointer${c.hex===s?';outline:2px solid #333;outline-offset:1px':''}"></div>`).join("")}
              </div>
            </div>
          </div>`:""}
          <span class="card-title" style="color:${c.hex};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</span>
        </div>
        <div class="flex" style="gap:3px;flex-shrink:0">
          ${(!isViewOnly&&!isU)?`<button class="sm" onclick="addGroup(${c.id})" style="font-size:9px;border-color:${hl(c.hex,.5)};color:${c.hex}">＋G</button>`:""}
          ${(!isViewOnly&&!isU)?`<button class="danger sm" onclick="removeCommunity(${c.id})">✕</button>`:""}
        </div>
      </div>
      ${gHtml}
    </div>`;
  }).join("");
}

// ===== RENDER VENN =====
let clipIdCounter=0;
function nameBlock(names,cx,cy,maxW,maxH,fill){
  // maxH: max pixel height available inside the circle region
  if(!names.length)return"";
  const lineH=12;
  const colW=Math.min(54,maxW*0.9);
  const cols=Math.max(1,Math.min(3,Math.floor(maxW/colW)));
  const maxRows=maxH?Math.max(1,Math.floor(maxH/lineH)):99;
  const maxNames=maxRows*cols;
  let show=names.slice(0,maxNames);
  const clipped=names.length>maxNames;
  const rows=Math.ceil(show.length/cols);
  const startY=cy-rows*lineH/2+lineH*0.72;
  let textEls="";
  show.forEach((nm,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const isLast=i===show.length-1&&clipped;
    const label=isLast?nm+"…":nm;
    textEls+=`<text x="${cx+(col-(cols-1)/2)*colW}" y="${startY+row*lineH}" text-anchor="middle" font-size="9" fill="${fill||"#111"}">${label}</text>`;
  });
  // Wrap in a clipPath so text can never visually escape its allotted box
  const clipId="nb-clip-"+(clipIdCounter++);
  const boxW=maxW+8, boxH=(maxH||rows*lineH+6)+4;
  return `<clipPath id="${clipId}"><rect x="${cx-boxW/2}" y="${cy-boxH/2}" width="${boxW}" height="${boxH}"/></clipPath>
    <g clip-path="url(#${clipId})">${textEls}</g>`;
}
function axisOptions(type){
  if(type==="community") return sortedCommunities().filter(c=>c.name!=="無所属").map(c=>({value:c.id+"",label:c.name,hex:c.hex}));
  if(type==="div") return DIVISIONS.map(d=>({value:d,label:d,hex:DIV_BORDER[d]||"#888"}));
  if(type==="role") return ROLES.map(r=>{const rc=ROLE_COLORS[r]||{border:"#aaa"};return{value:r,label:r,hex:rc.border};});
  return [];
}
function axisHex(ax){
  if(!ax||ax.type==="none"||!ax.value)return"#aaa";
  const opts=axisOptions(ax.type);
  return opts.find(o=>o.value===ax.value)?.hex||"#aaa";
}
function axisLabel(ax){
  if(!ax||ax.type==="none"||!ax.value)return"";
  const opts=axisOptions(ax.type);
  return opts.find(o=>o.value===ax.value)?.label||ax.value;
}
function axisMids(ax){
  if(!ax||ax.type==="none"||!ax.value)return new Set();
  if(ax.type==="community"){
    const cid=parseInt(ax.value);
    return new Set(comMemberIds(cid));
  }
  if(ax.type==="div") return new Set(members.filter(m=>m.div===ax.value).map(m=>m.id));
  if(ax.type==="role") return new Set(members.filter(m=>(Array.isArray(m.role)?m.role:[m.role]).includes(ax.value)).map(m=>m.id));
  return new Set();
}
function renderVennModeUI(){
  // Highlight active radio label
  document.querySelectorAll("#vennModeRow label").forEach(lbl=>{
    const inp=lbl.querySelector("input");
    const active=inp.value===vennMode;
    lbl.style.background=active?"#1a5fd4":"#fff";
    lbl.style.color=active?"#fff":"#555";
    lbl.style.borderColor=active?"#1a5fd4":"#ccc";

}

function renderFilterRows(){
  const divBlock=document.getElementById("filterDivBlock");
  const roleBlock=document.getElementById("filterRoleBlock");
  // 軸と同じ種類のフィルターは隠す（冗長なため）
  if(divBlock)divBlock.style.display=(vennMode==="div")?"none":"";
  if(roleBlock)roleBlock.style.display=(vennMode==="role")?"none":"";
  if(vennMode==="div"&&vennFilterDiv.length){vennFilterDiv=[];}
  if(vennMode==="role"&&vennFilterRole.length){vennFilterRole=[];}
  // div filter buttons
  const divRow=document.getElementById("filterDivRow");
  if(divRow){
    divRow.innerHTML=DIVISIONS.map(d=>{
      const on=vennFilterDiv.includes(d);

      return`<span onclick="toggleFilterDiv('${d}')" style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;cursor:pointer;border:1px solid ${on?col:"#ddd"};background:${on?hl(col,.15):"transparent"};color:${on?col:"#bbb"}">${on?"✓ ":""}${d}</span>`;
    }).join("");

  const roleRow=document.getElementById("filterRoleRow");

    roleRow.innerHTML=ROLES.map(r=>{

    }).join("");
  }
}

function toggleFilterDiv(d){
  if(vennFilterDiv.includes(d))vennFilterDiv=vennFilterDiv.filter(x=>x!==d);
  else vennFilterDiv.push(d);
  renderVennPanel();
}
function toggleFilterRole(r){
  if(vennFilterRole.includes(r))vennFilterRole=vennFilterRole.filter(x=>x!==r);
  else vennFilterRole.push(r);
  renderVennPanel();
}

function getFilteredMemberIds(){
  // Returns member IDs that pass the active filters
  return members.filter(m=>{
    const divOk=vennFilterDiv.length===0||vennFilterDiv.includes(m.div);
    const mrl2=Array.isArray(m.role)?m.role:(m.role?[m.role]:[]);
    const roleOk=vennFilterRole.length===0||vennFilterRole.some(r=>mrl2.includes(r));
    return divOk&&roleOk;
  }).map(m=>m.id);
}

function vennItemsForMode(){
  if(vennMode==="community") return sortedCommunities().filter(c=>c.name!=="無所属").map(c=>({key:"c_"+c.id,label:c.name,hex:c.hex}));
  if(vennMode==="div") return DIVISIONS.map(d=>({key:"d_"+d,label:d,hex:DIV_BORDER[d]||"#888"}));
  if(vennMode==="role") return ROLES.map(r=>{const rc=ROLE_COLORS[r]||{border:"#aaa"};return{key:"r_"+r,label:r,hex:rc.border};});
  return[];
}

function getMidsForKeyFiltered(key){
  const filtered=new Set(getFilteredMemberIds());
  let base;
  if(key.startsWith("c_")){const cid=parseInt(key.slice(2));base=new Set(comMemberIds(cid));}
  else if(key.startsWith("d_")){const div=key.slice(2);base=new Set(members.filter(m=>m.div===div).map(m=>m.id));}
  else if(key.startsWith("r_")){const role=key.slice(2);base=new Set(members.filter(m=>(Array.isArray(m.role)?m.role:[m.role]).includes(role)).map(m=>m.id));}
  else base=new Set();
  return new Set([...base].filter(x=>filtered.has(x)));
}

function renderVennSel(){
  const items=vennItemsForMode();
  const keys=items.map(i=>i.key);
  vennSel=vennSel.filter(k=>keys.includes(k));
  document.getElementById("vennSelector").innerHTML=items.map(item=>{
    const on=vennSel.includes(item.key);
    return`<span onclick="toggleVennKey('${item.key}')" style="display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;margin:2px;cursor:pointer;border:1.5px solid ${on?item.hex:"#ccc"};background:${on?hl(item.hex,.12):"#f5f5f5"};color:${on?item.hex:"#555"}">
      <span style="width:7px;height:7px;border-radius:50%;background:${item.hex};display:inline-block"></span>${item.label}${on?" ✓":""}
    </span>`;
  }).join("");
}

function toggleVennKey(key){
  if(vennSel.includes(key))vennSel=vennSel.filter(x=>x!==key);
  else if(vennSel.length<3)vennSel.push(key);
  renderVennSel();renderVenn();
}

function renderVennPanel(){
  renderVennModeUI();
  renderFilterRows();
  renderVennSel();
  renderVenn();
}

function hexForKey2(key){return vennItemsForMode().find(i=>i.key===key)?.hex||"#888";}
function labelForKey2(key){return vennItemsForMode().find(i=>i.key===key)?.label||key;}

function renderVenn(){
  const svg=document.getElementById("vennSvg");
  svg.innerHTML="";
  const n=vennSel.length;
  const filterActive=vennFilterDiv.length>0||vennFilterRole.length>0;
  if(!n){
    svg.setAttribute("viewBox","0 0 640 340");svg.style.maxHeight="420px";
    svg.innerHTML=`<text x="320" y="170" text-anchor="middle" font-size="14" fill="#aaa">項目を選択してください</text>`;return;
  }
  const ns=ids=>[...ids].map(id=>mn(id)).filter(Boolean);
  const filterLabel=filterActive?` [${[...vennFilterDiv,...vennFilterRole].join("・")}]`:"";

  if(n===1){
    const key=vennSel[0];const hex=hexForKey2(key);const label=labelForKey2(key)+filterLabel;
    const names=ns(getMidsForKeyFiltered(key));
    const svgH=Math.max(260,110+Math.ceil(names.length/3)*14);
    svg.setAttribute("viewBox",`0 0 640 ${svgH}`);svg.style.maxHeight=Math.min(svgH,380)+"px";
    const cy=svgH/2+18;
    const ry=svgH/2-30;
    svg.innerHTML=`<ellipse cx="320" cy="${cy}" rx="160" ry="${ry}" fill="${hl(hex,.18)}" stroke="${hex}" stroke-width="2"/>
      <text x="320" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="${hex}">${label}</text>
      ${nameBlock(names,320,cy,280,ry*1.7)}`;return;
  }
  if(n===2){
    const [k1,k2]=vennSel;
    const [h1,h2]=[hexForKey2(k1),hexForKey2(k2)];
    const [l1,l2]=[labelForKey2(k1)+filterLabel,labelForKey2(k2)+filterLabel];
    const s1=getMidsForKeyFiltered(k1),s2=getMidsForKeyFiltered(k2);
    const both=ns(new Set([...s1].filter(x=>s2.has(x))));
    const o1=ns(new Set([...s1].filter(x=>!s2.has(x))));
    const o2=ns(new Set([...s2].filter(x=>!s1.has(x))));
    const maxR=Math.max(Math.ceil(o1.length/2),Math.ceil(o2.length/2),Math.ceil(both.length/2));
    const svgH=Math.max(260,65+maxR*14+55);const cy=svgH/2+8;
    svg.setAttribute("viewBox",`0 0 640 ${svgH}`);svg.style.maxHeight=Math.min(svgH,420)+"px";
    svg.innerHTML=`<ellipse cx="210" cy="${cy}" rx="165" ry="${cy-30}" fill="${hl(h1,.18)}" stroke="${h1}" stroke-width="2"/>
      <ellipse cx="430" cy="${cy}" rx="165" ry="${cy-30}" fill="${hl(h2,.18)}" stroke="${h2}" stroke-width="2"/>
      <text x="92" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="${h1}">${l1}</text>
      <text x="548" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="${h2}">${l2}</text>
      ${nameBlock(o1,108,cy,135,cy*1.6)}
      ${nameBlock(o2,532,cy,135,cy*1.6)}
      ${both.length?`<text x="320" y="${cy-Math.ceil(both.length/2)*7-6}" text-anchor="middle" font-size="9" font-weight="700" fill="#555">共通</text>`:""}
      ${nameBlock(both,320,cy,110,cy*1.4,"#333")}`;return;
  }
  if(n===3){
    const ks=vennSel;
    const hs=ks.map(hexForKey2),ls=ks.map(k=>labelForKey2(k)+filterLabel);
    const sets=ks.map(getMidsForKeyFiltered);
    const inter=(a,b)=>new Set([...a].filter(x=>b.has(x)));
    const d3=(a,b,c)=>new Set([...a].filter(x=>!b.has(x)&&!c.has(x)));
    const only=[ns(d3(sets[0],sets[1],sets[2])),ns(d3(sets[1],sets[0],sets[2])),ns(d3(sets[2],sets[0],sets[1]))];
    const ab=ns(new Set([...inter(sets[0],sets[1])].filter(x=>!sets[2].has(x))));
    const ac=ns(new Set([...inter(sets[0],sets[2])].filter(x=>!sets[1].has(x))));
    const bc=ns(new Set([...inter(sets[1],sets[2])].filter(x=>!sets[0].has(x))));
    const abc=ns(inter(inter(sets[0],sets[1]),sets[2]));
    // 一番多い「片側のみ」リストの行数を見て、円の縦サイズと全体の高さを動的に決める
    const maxOnlyRows=Math.max(only[0].length,only[1].length,only[2].length);
    const ry=Math.max(95,72+Math.ceil(maxOnlyRows/2)*7);
    const cyTop=ry+30, cyBot=cyTop+ry*0.72;
    const svgH=Math.ceil(cyBot+ry*0.9+30);
    svg.setAttribute("viewBox",`0 0 640 ${svgH}`);svg.style.maxHeight=Math.min(svgH,440)+"px";
    svg.innerHTML=`<ellipse cx="230" cy="${cyTop}" rx="140" ry="${ry}" fill="${hl(hs[0],.18)}" stroke="${hs[0]}" stroke-width="2"/>
      <ellipse cx="410" cy="${cyTop}" rx="140" ry="${ry}" fill="${hl(hs[1],.18)}" stroke="${hs[1]}" stroke-width="2"/>
      <ellipse cx="320" cy="${cyBot}" rx="140" ry="${ry}" fill="${hl(hs[2],.18)}" stroke="${hs[2]}" stroke-width="2"/>
      <text x="118" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="${hs[0]}">${ls[0]}</text>
      <text x="522" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="${hs[1]}">${ls[1]}</text>
      <text x="320" y="${svgH-7}" text-anchor="middle" font-size="11" font-weight="700" fill="${hs[2]}">${ls[2]}</text>
      ${nameBlock(only[0],143,cyTop-15,102,ry*0.85)}${nameBlock(only[1],497,cyTop-15,102,ry*0.85)}${nameBlock(only[2],320,cyBot+ry*0.42,102,ry*0.6)}
      ${nameBlock(ab,320,cyTop+9,93,47,"#555")}
      ${nameBlock(ac,222,(cyTop+cyBot)/2+4,85,51,"#555")}
      ${nameBlock(bc,418,(cyTop+cyBot)/2+4,85,51,"#555")}
      ${nameBlock(abc,320,(cyTop+cyBot)/2+19,71,41,"#333")}`;
  }
}

function render(){renderRoster();renderMap();renderVennPanel();initRosterDragDrop();renderDivRoleLists();}

function autoScale(){
  const app=document.getElementById("mainApp");
  const mainGrid=app?app.querySelector(".main-grid"):null;
  if(!app||!mainGrid)return;
  const naturalW=930;
  const screenW=window.innerWidth;
  if(screenW<naturalW){
    const scale=screenW/naturalW;
    app.style.transform=`scale(${scale})`;
    app.style.transformOrigin="top left";
    app.style.width=naturalW+"px";
    document.body.style.height=(app.offsetHeight*scale+20)+"px";
    document.body.style.overflowX="auto";
    mainGrid.style.gridTemplateColumns="400px 1fr";
  } else {
    app.style.transform="";
    app.style.transformOrigin="";
    app.style.width="";
    document.body.style.height="";
    document.body.style.overflowX="";
    mainGrid.style.gridTemplateColumns="480px 1fr";
  }
}
window.addEventListener("resize",autoScale);

setEditMode(false);
render();
renderVennModeUI();
autoScale();
